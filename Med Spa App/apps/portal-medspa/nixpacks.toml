# Railway build config — Med Spa portal (pnpm monorepo)
# Deploy this service with Root Directory = apps/portal-medspa.
# Nixpacks auto-detects Node/pnpm; this file wires the monorepo workspace install
# (packages live in ../../packages/*) and builds/starts just the portal app.

[phases.install]
cmd = "pnpm install --frozen-lockfile"

[phases.build]
cmd = "pnpm --filter portal-medspa... build"

[start]
cmd = "pnpm --filter portal-medspa start"
